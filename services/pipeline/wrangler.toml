name = "pipeline"
main = "src/index.ts"
compatibility_date = "2025-06-01"
# Internal-only: reachable only via the gateway's PIPELINE_SERVICE binding.
# `workers_dev = false` disables the public `<name>.<account>.workers.dev`
# URL so identity headers (`X-Tenant-Id`, `X-User-Id`, `X-Scope`,
# `X-MCP-Session-Id`) cannot be spoofed by external callers.
workers_dev = false

[dev]
ip = "127.0.0.1"
port = 8790
inspector_port = 9790

# Indie platform DB — same `flowpunk-indie` D1 the gateway and contacts bind
# (ADR-011 §Tenancy: indie is single-D1).
[[d1_databases]]
binding = "DB"
database_name = "flowpunk-indie"
database_id = "placeholder-flowpunk-indie-db"
migrations_dir = "../../packages/db/migrations"

# Idempotency cache for mutation handlers — keyed per
# (tenant, user, method, path, idempotency-key) with body-hash binding.
# Default TTL 24h. See @flowpunk/service-utils withIdempotency.
[[kv_namespaces]]
binding = "IDEMPOTENCY_KV"
id = "placeholder-pipeline-idempotency-kv"
