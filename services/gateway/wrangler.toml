name = "gateway"
main = "src/index.ts"
compatibility_date = "2025-06-01"

[dev]
ip = "127.0.0.1"
port = 8787
inspector_port = 9787

[vars]
MAX_REQUEST_BODY_BYTES = "10485760"  # 10 MB
SERVICE_TIMEOUT_MS = "10000"
ALLOWED_ORIGINS = "http://localhost:4321,http://localhost:3000"
# Per-service MCP introspection adoption flag. Empty → all services use
# static-registry fallback (safe default for fresh deploys). Set to
# "contacts,pipeline" once those services are deployed and their
# `GET /mcp/tools` endpoints have been smoke-tested.
MCP_TOOLS_DYNAMIC_SERVICES = ""
# Build-time edition marker. `'all'` for indie; `'managed'` for the
# managed wrapper. Edition filters tool-registry at registry-build time
# inside each gateway wrapper (ADR-006:41 / ADR-008:33).
EDITION = "all"

[[kv_namespaces]]
binding = "MCP_TOOLS_KV"
id = "placeholder-mcp-tools-kv"

[[kv_namespaces]]
binding = "MCP_SESSIONS_KV"
id = "placeholder-mcp-sessions-kv"

# Indie platform DB — single bound D1 per ADR-011 §Tenancy. Carries
# `users` (multi-user, single-admin) and `mcp_sessions` for cookie-backed
# session auth on the admin-REST surface. Future indie AUTH_SERVICE will
# bind this same DB via service binding rather than getting its own D1.
[[d1_databases]]
binding = "DB"
database_name = "flowpunk-indie"
database_id = "placeholder-flowpunk-indie-db"
migrations_dir = "../../packages/db/migrations"

[[durable_objects.bindings]]
name = "MCP_SESSION_DO"
class_name = "McpSessionDurableObject"

[[migrations]]
tag = "mcp-session-do-v1"
new_sqlite_classes = ["McpSessionDurableObject"]

# Service bindings
[[services]]
binding = "CONTACTS_SERVICE"
service = "contacts"

[[services]]
binding = "PIPELINE_SERVICE"
service = "pipeline"

[[services]]
binding = "AUTOMATIONS_SERVICE"
service = "automations"

[[services]]
binding = "AUTH_SERVICE"
service = "auth"

[[services]]
binding = "FORMINPUTS_SERVICE"
service = "forminputs"

[[services]]
binding = "CMS_SERVICE"
service = "cms"

[[services]]
binding = "USERS_SERVICE"
service = "users"
